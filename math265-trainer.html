<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MATH 265 Algebra Trainer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #161b22;
    --bg3: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #7d8590;
    --green: #4ade80;
    --red: #f87171;
    --blue: #58a6ff;
    --yellow: #fbbf24;
    --purple: #a78bfa;
    --accent: #238636;
    --radius: 8px;
    --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-ui); }

  /* ── LAYOUT ── */
  #app { display: flex; flex-direction: column; height: 100vh; max-width: 900px; margin: 0 auto; padding: 0 16px; }
  #header { padding: 12px 0 8px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  #header h1 { font-size: 13px; color: var(--muted); font-family: var(--font-mono); letter-spacing: 0.05em; }
  #timer { font-family: var(--font-mono); font-size: 13px; color: var(--muted); transition: color 0.3s; }
  #timer.warning { color: var(--yellow); }
  #timer.danger { color: var(--red); }

  /* ── TABS ── */
  #tabs { display: flex; gap: 4px; padding: 10px 0 0; flex-shrink: 0; flex-wrap: wrap; }
  .tab { padding: 6px 14px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg2); color: var(--muted); font-size: 13px; cursor: pointer; transition: all 0.15s; user-select: none; }
  .tab:hover { border-color: var(--blue); color: var(--text); }
  .tab.active { background: var(--blue); border-color: var(--blue); color: #0f1117; font-weight: 600; }

  /* ── SUBBAR ── */
  #subbar { display: flex; align-items: center; gap: 8px; padding: 8px 0 4px; flex-shrink: 0; flex-wrap: wrap; }
  #subbar label { font-size: 12px; color: var(--muted); }
  .diff-btn { padding: 4px 10px; border-radius: 5px; border: 1px solid var(--border); background: var(--bg2); color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .diff-btn:hover { border-color: var(--purple); color: var(--text); }
  .diff-btn.active { background: var(--purple); border-color: var(--purple); color: #0f1117; font-weight: 600; }
  #mode-btns { margin-left: auto; display: flex; gap: 6px; }
  .mode-btn { padding: 4px 10px; border-radius: 5px; border: 1px solid var(--border); background: var(--bg2); color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .mode-btn:hover { border-color: var(--yellow); color: var(--text); }
  .mode-btn.active { background: var(--yellow); border-color: var(--yellow); color: #0f1117; font-weight: 600; }

  /* ── MAIN PROBLEM AREA ── */
  #main { flex: 1; display: flex; flex-direction: column; justify-content: center; min-height: 0; padding: 8px 0; }
  #problem-type { text-align: center; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding: 6px 0 0; min-height: 18px; }
  #problem-display { text-align: center; padding: 12px 16px 20px; min-height: 80px; display: flex; align-items: center; justify-content: center; }
  #problem-display .katex-display { margin: 0; }
  #problem-display .katex { font-size: 2.2rem; }

  /* ── INPUT AREA ── */
  #input-area { padding: 0 0 8px; }
  #input-row { display: flex; gap: 8px; align-items: center; }
  #answer-input {
    flex: 1; padding: 10px 14px; background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-family: var(--font-mono);
    font-size: 15px; outline: none; transition: border-color 0.15s;
  }
  #answer-input:focus { border-color: var(--blue); }
  #answer-input.correct { border-color: var(--green); background: rgba(74,222,128,0.08); }
  #answer-input.wrong { border-color: var(--red); background: rgba(248,113,113,0.08); }
  #check-btn {
    padding: 10px 20px; background: var(--accent); border: 1px solid #2ea043;
    border-radius: var(--radius); color: #fff; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  #check-btn:hover { background: #2ea043; }
  #check-btn:disabled { opacity: 0.4; cursor: default; }

  /* live preview */
  #live-preview { min-height: 28px; padding: 4px 8px; font-size: 13px; color: var(--muted); }
  #live-preview .katex { font-size: 1.1rem; }
  #parse-error { font-size: 12px; color: var(--red); font-family: var(--font-mono); padding: 2px 8px; }

  /* feedback */
  #feedback { min-height: 26px; padding: 4px 8px; font-size: 13px; font-weight: 600; transition: all 0.3s; }
  #feedback.correct { color: var(--green); }
  #feedback.wrong { color: var(--red); }
  #feedback.info { color: var(--blue); }

  /* ── STEPS ── */
  #steps-area { border-top: 1px solid var(--border); padding: 10px 0 4px; }
  #steps-controls { display: flex; gap: 8px; align-items: center; padding-bottom: 8px; }
  #reveal-step-btn {
    padding: 6px 14px; background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-size: 13px; cursor: pointer; transition: all 0.15s;
  }
  #reveal-step-btn:hover:not(:disabled) { border-color: var(--yellow); color: var(--yellow); }
  #reveal-step-btn:disabled { opacity: 0.4; cursor: default; }
  #skip-btn {
    padding: 6px 14px; background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--muted); font-size: 13px; cursor: pointer; transition: all 0.15s;
    margin-left: auto;
  }
  #skip-btn:hover { border-color: var(--muted); color: var(--text); }
  #steps-list { display: flex; flex-direction: column; gap: 6px; max-height: 220px; overflow-y: auto; }
  .step-item { padding: 8px 12px; background: var(--bg2); border-radius: var(--radius); border-left: 3px solid var(--border); animation: fadeIn 0.2s ease; }
  .step-item.revealed { border-left-color: var(--yellow); }
  .step-label { font-size: 16.5px; color: var(--yellow); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .step-math { }
  .step-math .katex { font-size: 1.5rem; }
  .step-note { font-size: 16.5px; color: var(--muted); margin-top: 3px; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

  /* ── STATS BAR ── */
  #stats-bar { border-top: 1px solid var(--border); padding: 8px 0 10px; flex-shrink: 0; }
  #stats-row { display: flex; align-items: center; gap: 16px; font-size: 12px; color: var(--muted); flex-wrap: wrap; }
  #stats-row strong { color: var(--text); }
  #progress-bar-wrap { flex: 1; min-width: 100px; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  #progress-bar-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.3s; }
  #streak-display { font-family: var(--font-mono); }
  #readiness { font-size: 11px; padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border); }
  #readiness.ready { border-color: var(--green); color: var(--green); }
  #readiness.not-ready { border-color: var(--border); color: var(--muted); }

  /* ── DASHBOARD OVERLAY ── */
  #dashboard-overlay {
    display: none; position: fixed; inset: 0; background: rgba(10,10,15,0.92);
    z-index: 100; overflow-y: auto; padding: 24px 16px;
  }
  #dashboard-overlay.visible { display: block; }
  #dash-inner { max-width: 700px; margin: 0 auto; }
  #dash-inner h2 { font-size: 18px; margin-bottom: 16px; }
  .dash-close { float: right; background: none; border: 1px solid var(--border); color: var(--text); padding: 4px 12px; border-radius: 5px; cursor: pointer; font-size: 13px; }
  .dash-section { margin-bottom: 20px; }
  .dash-section h3 { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  .module-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
  .module-card { background: var(--bg2); border-radius: var(--radius); padding: 12px; border: 1px solid var(--border); }
  .module-card h4 { font-size: 12px; color: var(--blue); margin-bottom: 8px; }
  .diff-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; padding: 2px 0; }
  .diff-row .acc { font-family: var(--font-mono); }
  .acc.high { color: var(--green); }
  .acc.mid { color: var(--yellow); }
  .acc.low { color: var(--red); }
  .spark-chart { display: flex; align-items: flex-end; gap: 3px; height: 40px; margin-top: 6px; }
  .spark-bar { flex: 1; background: var(--blue); border-radius: 2px 2px 0 0; opacity: 0.7; min-height: 2px; }
  .badge-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; border: 1px solid var(--border); color: var(--muted); }
  .badge.earned { border-color: var(--yellow); color: var(--yellow); background: rgba(251,191,36,0.08); }
  #session-summary-overlay {
    display: none; position: fixed; inset: 0; background: rgba(10,10,15,0.95);
    z-index: 200; align-items: center; justify-content: center;
  }
  #session-summary-overlay.visible { display: flex; }
  #summary-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 32px; max-width: 480px; width: 100%; }
  #summary-card h2 { font-size: 22px; margin-bottom: 6px; }
  #summary-card .big-acc { font-size: 48px; font-family: var(--font-mono); font-weight: 700; margin: 16px 0; }
  .summary-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .summary-row:last-child { border-bottom: none; }
  #summary-continue-btn { margin-top: 20px; width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: var(--radius); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; }

  /* flash animations */
  @keyframes flashGreen { 0%,100% { background: var(--bg); } 30% { background: rgba(74,222,128,0.15); } }
  @keyframes flashRed { 0%,100% { background: var(--bg); } 30% { background: rgba(248,113,113,0.1); } }
  .flash-correct { animation: flashGreen 0.6s ease; }
  .flash-wrong { animation: flashRed 0.6s ease; }

  /* unlock bar */
  #unlock-bar { display:none; padding: 4px 12px 6px; font-size: 11px; color: var(--muted); text-align: center; }
  #unlock-bar.visible { display:block; }
  #unlock-bar .unlock-modules { display:flex; justify-content:center; gap:6px; flex-wrap:wrap; margin-bottom:4px; }
  #unlock-bar .umod { padding:2px 8px; border-radius:20px; font-size:10px; font-weight:600; letter-spacing:0.05em; }
  #unlock-bar .umod.active { background:rgba(74,222,128,0.15); color:#4ade80; }
  #unlock-bar .umod.locked { background:rgba(255,255,255,0.06); color:var(--muted); }
  #unlock-bar .umod.new { background:rgba(251,191,36,0.2); color:#fbbf24; }
  #unlock-bar .unlock-next { font-size:10px; }
  #unlock-bar progress { width:120px; height:4px; vertical-align:middle; margin:0 4px; accent-color:#4ade80; }

  /* unlock toast */
  #unlock-toast { position:fixed; top:60px; left:50%; transform:translateX(-50%) translateY(-20px); background:#1e293b; border:1px solid #4ade80; border-radius:8px; padding:10px 18px; font-size:13px; font-weight:600; color:#4ade80; opacity:0; transition:opacity 0.3s, transform 0.3s; pointer-events:none; z-index:999; white-space:nowrap; }
  #unlock-toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* mobile */
  @media (max-width: 600px) {
    #problem-display .katex { font-size: 1.6rem; }
    #answer-input { font-size: 13px; }
    #tabs { gap: 3px; }
    .tab { padding: 5px 10px; font-size: 12px; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>MATH 265 · Algebra Trainer</h1>
    <div style="display:flex;gap:12px;align-items:center;">
      <button id="dash-btn" class="mode-btn" style="margin:0;">Stats</button>
      <span id="timer">—</span>
    </div>
  </div>

  <div id="tabs">
    <button class="tab active" data-module="factoring">Factoring</button>
    <button class="tab" data-module="exponents">Exponents</button>
    <button class="tab" data-module="fractions">Fractions</button>
    <button class="tab" data-module="trig">Trig</button>
    <button class="tab" data-module="logs">Logs</button>
    <button class="tab" data-module="composition">Composition</button>
    <button class="tab" data-module="limits">Limits</button>
    <button class="tab" data-module="derivatives">Derivatives</button>
    <button class="tab" data-module="integration">Integration</button>
    <button class="tab" data-module="adv_integration">Adv Integration</button>
    <button class="tab" data-module="all">All</button>
  </div>

  <div id="subbar">
    <label>Difficulty:</label>
    <button class="diff-btn" data-diff="1">1</button>
    <button class="diff-btn" data-diff="2">2</button>
    <button class="diff-btn" data-diff="3">3</button>
    <button class="diff-btn" data-diff="4">4</button>
    <button class="diff-btn" data-diff="5">5</button>
    <button class="diff-btn active" data-diff="auto">Auto</button>
    <div id="mode-btns">
      <button class="mode-btn active" data-mode="endless">Endless</button>
      <button class="mode-btn" data-mode="sprint">Sprint 25</button>
      <button class="mode-btn" data-mode="exam">Exam Sim</button>
    </div>
  </div>

  <div id="unlock-bar">
    <div class="unlock-modules" id="unlock-modules-list"></div>
    <div class="unlock-next" id="unlock-next-text"></div>
  </div>
  <div id="unlock-toast"></div>

  <div id="main">
    <div id="problem-type"></div>
    <div id="problem-display"><span style="color:var(--muted);font-size:14px;">Loading...</span></div>
    <div id="input-area">
      <div id="input-row">
        <input id="answer-input" type="text" placeholder="type answer here" autocomplete="off" autocorrect="off" spellcheck="false">
        <button id="check-btn">Check</button>
      </div>
      <div id="live-preview"></div>
      <div id="parse-error"></div>
      <div id="feedback"></div>
    </div>
    <div id="steps-area">
      <div id="steps-controls">
        <button id="reveal-step-btn" disabled>Reveal step 1</button>
        <button id="skip-btn">Skip →</button>
      </div>
      <div id="steps-list"></div>
    </div>
  </div>

  <div id="stats-bar">
    <div id="stats-row">
      <span>Session: <strong id="stat-correct">0</strong>/<strong id="stat-total">0</strong></span>
      <div id="progress-bar-wrap"><div id="progress-bar-fill" style="width:0%"></div></div>
      <span id="streak-display">Streak: <strong id="stat-streak">0</strong></span>
      <span>Best: <strong id="stat-best">0</strong></span>
      <span id="readiness" class="not-ready">exam ready?</span>
    </div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard-overlay">
  <div id="dash-inner">
    <button class="dash-close" id="dash-close-btn">✕ Close</button>
    <h2>Progress Dashboard</h2>
    <div class="dash-section">
      <h3>Accuracy by Module &amp; Difficulty</h3>
      <div class="module-grid" id="module-grid"></div>
    </div>
    <div class="dash-section">
      <h3>Session Accuracy (last 10)</h3>
      <div class="spark-chart" id="spark-chart"></div>
    </div>
    <div class="dash-section">
      <h3>Mastery Badges</h3>
      <div class="badge-grid" id="badge-grid"></div>
    </div>
    <div class="dash-section">
      <h3>Totals</h3>
      <div id="dash-totals" style="font-size:13px;line-height:2;"></div>
    </div>
    <div class="dash-section">
      <h3>30-Day Accuracy Trend</h3>
      <canvas id="trend-chart" width="500" height="120" style="width:100%;max-width:500px;display:block;"></canvas>
      <div id="trend-empty" style="color:var(--muted);font-size:12px;display:none;"></div>
    </div>
    <div class="dash-section">
      <h3>Weak Spots <small style="color:var(--muted);font-size:11px;">(≥3 attempts, lowest accuracy)</small></h3>
      <div id="weak-spots-list"></div>
    </div>
  </div>
</div>

<!-- Session Summary -->
<div id="session-summary-overlay">
  <div id="summary-card">
    <h2 id="summary-title">Session Complete</h2>
    <div class="big-acc" id="summary-acc">—%</div>
    <div id="summary-rows"></div>
    <button id="summary-continue-btn">Continue Drilling</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// UTILITY
// ─────────────────────────────────────────────────────────────────────────────
const R = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
const pick = arr => arr[R(0,arr.length-1)];
const gcd = (a,b) => b===0?Math.abs(a):gcd(b,a%b);
const lcm = (a,b) => Math.abs(a*b)/gcd(a,b);
function simplifyFrac(n,d){ const g=gcd(Math.abs(n),Math.abs(d)); return [n/g,d/g]; }
const fracToTex = (sn,sd) => sd===1?`${sn}`:`\frac{${sn}}{${sd}}`;
const expFracToNorm = (sn,sd) => sd===1?`x^${sn}`:`x^(${sn}/${sd})`;
const signStr = n => n>=0?`+${n}`:`${n}`;

// ─────────────────────────────────────────────────────────────────────────────
// CONFIG — edit parameter ranges here
// ─────────────────────────────────────────────────────────────────────────────
const CONFIG = {
  factoring: {
    diffSquares_a:        [2, 200],   // x² − a²: root range
    simpleTrinomial_pq:   [-16, 16], // x²+bx+c roots p,q
    gcf_k:                [2, 13],    // GCF coefficient
    gcf_pq:               [-16, 16],   // GCF inner roots
    leadCoeff_a:          [2,3,5,6,7,8,9], // leading coeff choices (array)
    leadCoeff_pq:         [-12, 12],   // (ax+p)(x+q) inner values
    cubes_a:              [2, 8],    // x³±a³ root
    quartic_a:            [2, 12],    // x⁴−a⁴ root
    grouping_ab:          [-16, 16],   // grouping a,b
    quadDisguise_pq:      [-16, 16],   // u-sub roots
    allXterms_k:          [2, 19],    // GCF·x factor for all-x-terms type
    allXterms_pq:         [-16, 16],   // roots of inner trinomial
    fracNegGcf_k:         [2, 12],    // diff4: outer integer coefficient
    trigTrinomial_pq:     [-9, 9],   // diff5: trig trinomial roots
    trigLeadCoeff_a:      [2, 5],    // diff5: leading coefficient for trig ax² type
  },
  exponents: {
    sameBase_ab:          [1, 12],    // x^a · x^b
    divideBase_b:         [1, 12],    // denominator exp
    divideBase_aExtra:    [1, 8],    // numerator = b + this
    powerPower_ab:        [2, 5],    // (x^a)^b
    negExp_a:             [1, 5],    // x^(-a)
    radicalToExp_m:       [1, 5],    // mth power under radical
    radicalToExp_n:       [2,3,4],   // radical index (array)
    fracExpArith_num:     [1, 3, 5],    // fractional exp numerators
    fracExpArith_den:     [2,3,4,5,6],   // fractional exp denominators (array)
    coeffRewrite_k:       [2, 15],   // k/(x^a√x) coefficient
    coeffRewrite_a:       [1, 5],    // x^a in denominator
    higherRadical_n:      [3,4,5],   // higher radical index (array)
    higherRadical_m:      [2, 13],    // power under higher radical
  },
  fractions: {
    addFrac_num:          [1, 25],    // a/b + c/d numerators
    addFrac_den:          [2, 25],    // denominators
    divFrac_all:          [1, 15],    // (a/b)÷(c/d) all values
    cancelFrac_a:         [1, 12],    // (x²−a²)/(x+a) root
    threeTermLCD_a:       [1, 12],    // 1/(x±a) + … root
    quotientRule_n:       [2, 8],    // derivative degree
    quotientRule_a:       [1, 8],    // (x+a) denominator
    polyCancel_pq:         [-6, 6],   // diff4: polynomial cancel roots
    rationalAdd_ab:        [1, 5],    // diff4: 1/(x+a)+1/(x+b) range
    threeTermSub_a:        [2, 6],    // diff5: three-term rational
    factorBoth_a:          [2, 8],    // diff5: (x²-a²)/(x²+2ax+a²)
  },
  adaptive: {
    bumpUpStreak:   5,   // correct-in-a-row to increase difficulty
    dropDownWrong:  3,   // wrongs-in-last-5 to decrease difficulty
    dedupWindow:    100,  // how many recent problems to avoid repeating
  },
};

// ─────────────────────────────────────────────────────────────────────────────
// wait for KaTeX
function renderKaTeX(tex, el, display=false){
  try {
    if(typeof katex==='undefined'){ el.textContent=tex; return; }
    katex.render(tex, el, { displayMode: display, throwOnError: false, trust: true });
  } catch(e){ el.textContent = tex; }
}

// ─────────────────────────────────────────────────────────────────────────────
// STORAGE
// ─────────────────────────────────────────────────────────────────────────────
const STORE_KEY = 'math265_v3';
function loadStore(){
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      const def = defaultStore();
      ['factoring','exponents','fractions','trig','logs','composition','limits','derivatives','integration','adv_integration'].forEach(m=>{
        if(!parsed[m]) parsed[m]=def[m];
        else [1,2,3,4,5].forEach(d=>{ if(!parsed[m][d]) parsed[m][d]=def[m][d]; });
      });
      if(!parsed.sessions) parsed.sessions=[];
      if(!parsed.badges) parsed.badges={};
      return parsed;

// Represent polynomial as array of coefficients [a_n, ..., a_1, a_0]
// We expand input strings to coefficients for comparison

function parseAndExpand(expr){
  // Returns null if can't parse, else canonical polynomial array (up to degree 4)
  try {
    return expandExpression(expr);
  } catch(e){ return null; }
}

// Very small CAS: expand products of linear/quadratic factors with integer coeffs
// Handles: (ax+b)(cx+d), c*(f1)*(f2), x^n, integers, sums
function expandExpression(expr){
  // Normalize input
  let s = expr.trim()
    .replace(/\s+/g,'')
    .replace(/\^/g,'**')
    .replace(/}{/g,'}*{') // KaTeX braces
    .replace(/\{([^}]*)\}/g,'($1)')
    .replace(/\\[a-z]+/g,'') // strip remaining latex
    .replace(/([0-9x\)])(\()/g,'$1*$2') // implicit multiply
    .replace(/\)(\()/g,')*$2')
    .replace(/([0-9\)])([a-z])/g,'$1*$2');
  // evaluate as polynomial in x using BigInt-safe approach
  // Use numeric polynomial multiplication
  return evalPoly(s);
}

// Polynomial represented as Map: degree->coeff
function polyAdd(a,b){
  const r=new Map(a);
  for(const [k,v] of b) r.set(k,(r.get(k)||0)+v);
  return r;
}
function polyMul(a,b){
  const r=new Map();
  for(const [ka,va] of a) for(const [kb,vb] of b) r.set(ka+kb,(r.get(ka+kb)||0)+va*vb);
  return r;
}
function polyScale(a,s){ const r=new Map(); for(const [k,v] of a) r.set(k,v*s); return r; }
function polyConst(c){ return new Map([[0,c]]); }
function polyX(){ return new Map([[1,1]]); }
function polyPow(p,n){
  let r=new Map([[0,1]]);
  for(let i=0;i<n;i++) r=polyMul(r,p);
  return r;
}
function normalizePoly(p){
  const r=new Map();
  for(const [k,v] of p) if(Math.abs(v)>1e-9) r.set(k,Math.round(v*1e6)/1e6);
  return r;
}
function polyToArr(p, maxDeg=4){
  const arr=[];
  for(let i=maxDeg;i>=0;i--) arr.push((p.get(i)||0));
  return arr;
}
function arrEq(a,b){ return a.length===b.length&&a.every((v,i)=>Math.abs(v-b[i])<0.001); }

// Simple recursive descent parser for polynomial expressions
function evalPoly(expr){
  const tokens = tokenize(expr);
  let pos=0;
  function peek(){ return pos<tokens.length?tokens[pos]:null; }
  function consume(){ return tokens[pos++]; }
  function parseExpr(){ return parseAddSub(); }
  function parseAddSub(){
    let left=parseMulDiv();
    while(peek()==='+' || peek()==='-'){
      const op=consume();
      const right=parseMulDiv();
      if(op==='+') left=polyAdd(left,right);
      else left=polyAdd(left,polyScale(right,-1));
    }
    return left;
  }
  function parseMulDiv(){
    let left=parseUnary();
    while(peek()==='*' || peek()==='/'){
      const op=consume();
      const right=parseUnary();
      if(op==='*') left=polyMul(left,right);
      else {
        // Division: only support constant divisor
        const arr=polyToArr(right,0);
        const c=arr[arr.length-1];
        if(c===0) throw new Error('div by zero');
        left=polyScale(left,1/c);
      }
    }
    return left;
  }
  function parseUnary(){
    if(peek()==='-'){ consume(); return polyScale(parsePow(),-1); }
    if(peek()==='+') { consume(); return parsePow(); }
    return parsePow();
  }
  function parsePow(){
    let base=parseAtom();
    while(peek()==='**'){
      consume();
      const exp=parseAtom();
      const expArr=polyToArr(exp,0);
      const n=expArr[expArr.length-1];
      if(Number.isInteger(n)&&n>=0) base=polyPow(base,n);
      else throw new Error('non-integer exponent in polynomial');
    }
    return base;
  }
  function parseAtom(){
    const t=peek();
    if(t==='('){
      consume();
      const v=parseExpr();
      if(peek()===')') consume();
      return v;
    }
    if(t==='x'||t==='X'){ consume(); return polyX(); }
    if(t!==null && !isNaN(Number(t))){ consume(); return polyConst(Number(t)); }
    throw new Error('unexpected token: '+t);
  }
  const result = parseExpr();
  return normalizePoly(result);
}

function tokenize(expr){
  const tokens=[];
  let i=0;
  while(i<expr.length){
    const c=expr[i];
    if(c===' '){ i++; continue; }
    if(c==='x'||c==='X'){ tokens.push('x'); i++; continue; }
    if(c==='*'&&expr[i+1]==='*'){ tokens.push('**'); i+=2; continue; }  // must be before single-* check
    if('+-*/()'.includes(c)){ tokens.push(c); i++; continue; }
    if((c>='0'&&c<='9')||c==='.'){
      let n='';
      while(i<expr.length&&((expr[i]>='0'&&expr[i]<='9')||expr[i]==='.')) n+=expr[i++];
      tokens.push(n); continue;
    }
    i++;
  }
  return tokens;
}

// Expand specifically for our generated factored forms (avoid parsing LaTeX)
function expandPoly(factored){
  try {
    const p = evalPoly(factored.replace(/\^/g,'**'));
    return p;
  } catch(e){ return null; }
}

function expandDeg4(expr){
  try { return evalPoly(expr.replace(/\^/g,'**')); } catch(e){ return null; }
}

function polyToTex(coeffs){
  // coeffs = [a_n, ..., a_1, a_0], degree = coeffs.length-1
  const deg=coeffs.length-1;
  let parts=[];
  for(let i=0;i<=deg;i++){
    const c=coeffs[i];
    const power=deg-i;
    if(c===0) continue;
    let term='';
    if(power===0) term=`${Math.abs(c)}`;
    else if(power===1) term=`${Math.abs(c)===1?'':Math.abs(c)}x`;
    else term=`${Math.abs(c)===1?'':Math.abs(c)}x^{${power}}`;
    parts.push({sign:c<0?'-':'+', term});
  }
  if(parts.length===0) return '0';
  let result=parts[0].sign==='-'?`-${parts[0].term}`:parts[0].term;
  for(let i=1;i<parts.length;i++) result+=` ${parts[i].sign} ${parts[i].term}`;
  return result;
}

function userInputToTex(input){
  // Convert user text input to KaTeX-renderable string
  let s = input.trim();
  if(!s) return '';

  // Trig notation (must run before exponent rewrites)
  s = s.replace(/\bsin\^2\s*x\b/g,'\\sin^2 x');
  s = s.replace(/\bcos\^2\s*x\b/g,'\\cos^2 x');
  s = s.replace(/\btan\^2\s*x\b/g,'\\tan^2 x');
  s = s.replace(/\bsin\s*x\b/g,'\\sin x');
  s = s.replace(/\bcos\s*x\b/g,'\\cos x');
  s = s.replace(/\btan\s*x\b/g,'\\tan x');

  // x^(3/2) -> x^{3/2}
  s = s.replace(/x\^\((-?\d+)\/(\d+)\)/g, (m,n,d)=>`x^{${n}/${d}}`);
  s = s.replace(/x\^(-?\d+)\/(\d+)/g, (m,n,d)=>`x^{${n}/${d}}`);
  s = s.replace(/x\^(-?\d+)/g, (m,n)=>`x^{${n}}`);
  s = s.replace(/x\^{(-?\d+)\/(\d+)}/g, (m,n,d)=>`x^{${n}/${d}}`);

  // Algebraic fractions — must come before numeric fraction rule
  // (A)/(B)  ->  \dfrac{A}{B}   (non-nested numerator, any denominator)
  s = s.replace(/\(([^()]+)\)\/\((.+)\)$/, (m,a,b)=>`\\dfrac{${a}}{${b}}`);
  // constant / (B)  ->  \dfrac{constant}{B}  e.g. -1/(x(x+h))
  if(!s.includes('\\dfrac'))
    s = s.replace(/^(-?\d+)\/\((.+)\)$/, (m,a,b)=>`\\dfrac{${a}}{${b}}`);

  // pure numeric fractions: 3/4 -> \dfrac{3}{4}
  s = s.replace(/(\d+)\/(\d+)/g, (m,a,b)=>`\\dfrac{${a}}{${b}}`);

  return s;
}

function userInputToNorm(input){
  // Normalize input for comparison
  let s = input.trim()
    .replace(/\s+/g,'')
    .toLowerCase()
    .replace(/x\^{([^}]*)}/g,'x^($1)')  // x^{3} -> x^(3)
    .replace(/x\^(-?\d+(?:\/\d+)?)/g,'x^($1)')
    ;
  return s;
}

function checkAnswer(problem, userInput){
  const u = userInput.trim();
  if(!u) return {result:'empty'};

  // For polynomial factoring problems: expand user input and compare to problem expansion
  if(problem.module === 'factoring'){
    if(problem.isFracExpGcf)    return checkExpFactoringAnswer(problem, u);
    if(problem.isTrigFactoring) return checkTrigFactoringAnswer(problem, u);
    return checkFactoringAnswer(problem, u);
  }
  if(problem.module === 'exponents'){
    return checkExponentAnswer(problem, u);
  }
  if(problem.module === 'fractions'){
    return checkFractionAnswer(problem, u);
  }
  return {result:'unknown'};
}

function checkFactoringAnswer(problem, u){
  // Try to expand user's answer and compare to original
  const orig = problem.originalExpanded;

  // Normalize user input for polynomial parser (use expandExpression so implicit
  // multiplication like (x+4)(x-4) is handled before tokenizing)
  let userPoly = null;
  try { userPoly = expandExpression(u); } catch(e){}

  let origPoly = null;
  try {
    if(typeof orig === 'string'){
      origPoly = expandExpression(orig);
    } else if(orig instanceof Map){
      origPoly = orig;
    }
  } catch(e){}

  if(userPoly && origPoly){
    // Compare up to degree 4
    const maxDeg = Math.max(...Array.from(userPoly.keys()), ...Array.from(origPoly.keys()), 0);
    let match = true;
    for(let i=0;i<=maxDeg;i++){
      if(Math.abs((userPoly.get(i)||0)-(origPoly.get(i)||0))>0.001){ match=false; break; }
    }
    if(match){
      // Check if user actually factored (has parentheses or is simpler than original)
      const factored = u.includes('(') || problem.isGrouping || problem.isQuadDisguise;
      if(!factored && !problem.isGrouping && !problem.isQuadDisguise){
        return {result:'partial', msg:'Expanded correctly but not factored — keep going'};
      }
      return {result:'correct'};
    }
  }

  // String fallback: normalize and compare
  const normUser = u.toLowerCase().replace(/\s+/g,'').replace(/\*/g,'');
  const normAns = problem.answerTex.toLowerCase().replace(/\s+/g,'').replace(/\*/g,'').replace(/\\[a-z]*/g,'').replace(/\{|\}/g,'');
  if(normUser === normAns) return {result:'correct'};

  return {result:'wrong'};
}

function checkExponentAnswer(problem, u){
  const norm = userInputToNorm(u);
  const ans = problem.answerNorm.toLowerCase().replace(/\s+/g,'');

  // Direct match
  if(norm === ans) return {result:'correct'};

  // x^(a) === x^a for integers
  const normSimple = norm.replace(/\((\d+)\)/g,'$1');
  if(normSimple === ans.replace(/\((\d+)\)/g,'$1')) return {result:'correct'};

  // 1/x^a === x^(-a)
  const neg = ans.match(/x\^\((-\d+)\)/);
  if(neg){
    const posExp = Math.abs(parseInt(neg[1]));
    if(norm === `1/x^${posExp}` || norm === `1/x^(${posExp})`) return {result:'correct'};
    if(posExp === 1 && norm === '1/x') return {result:'correct'};
    // coefficient form: e.g. 4x^(-1) → 4/x or 4/x^1
    const coeff = ans.match(/^(\d+)x\^\(-\d+\)$/);
    if(coeff){
      const k = coeff[1];
      if(norm === `${k}/x^${posExp}` || norm === `${k}/x^(${posExp})`) return {result:'correct'};
      if(posExp === 1 && norm === `${k}/x`) return {result:'correct'};
    }
  }

  // Fractional: x^(3/2) and x^1.5
  const frac = ans.match(/x\^\((\d+)\/(\d+)\)/);
  if(frac){
    const decimal = (parseInt(frac[1])/parseInt(frac[2])).toFixed(4);
    if(norm === `x^${parseFloat(decimal)}` || norm === `x^(${parseFloat(decimal)})`) return {result:'correct'};
  }

  // Numeric answers (like 1/x^3 problems)
  if(ans.startsWith('1/') && norm === ans) return {result:'correct'};
  // 1/x^1 === 1/x  (and k/x^1 === k/x)
  if(ans.endsWith('x^1') && norm === ans.replace(/x\^1$/, 'x')) return {result:'correct'};

  return {result:'wrong'};
}

function evalFracExpr(expr, x){
  // Evaluate a user-typed algebraic fraction expression at a given x.
  // Supports: +,-,*,/,^,**, implicit multiplication between ) and (, digits and x.
  let s = expr.trim()
    .toLowerCase()
    .replace(/\^/g, '**')
    .replace(/\)\s*\(/g, ')*(')      // (a)(b) -> (a)*(b)
    .replace(/(\d)\s*\(/g, '$1*(')   // 2(x+1) -> 2*(x+1)
    .replace(/\)\s*(\d)/g, ')*$1')   // (x+1)2 -> (x+1)*2
    .replace(/(\d)x/g, '$1*x')       // 2x -> 2*x
    .replace(/x(\d)/g, 'x*$1');      // x2 -> x*2 (edge case)
  // Only allow safe characters
  if(!/^[0-9x+\-*/(). ]+$/.test(s)) return NaN;
  try {
    // eslint-disable-next-line no-new-func
    return Function('x', `"use strict"; return (${s});`)(x);
  } catch(e){ return NaN; }
}

function fractionExprsEqual(a, b){
  // Spot-check 5 irrational-ish x values to avoid accidental integer coincidences.
  const testVals = [1.3, 2.7, 3.1, 5.9, 7.4];
  let validTests = 0;
  for(const x of testVals){
    const va = evalFracExpr(a, x);
    const vb = evalFracExpr(b, x);
    if(!isFinite(va) || !isFinite(vb)) continue; // skip if x is a pole
    if(Math.abs(va - vb) > 0.0001) return false;
    validTests++;
  }
  return validTests >= 3; // need at least 3 clean comparisons
}

function checkFractionAnswer(problem, u){
  const norm = userInputToNorm(u);
  // Apply same normalization to answerNorm so x^2 and x^(2) compare equal
  const ans = userInputToNorm(String(problem.answerNorm));

  if(norm === ans) return {result:'correct'};

  // Try numeric fraction comparison: sn/sd
  const numFrac = ans.match(/^(\d+)\/(\d+)$/);
  const userFrac = norm.match(/^(\d+)\/(\d+)$/);
  if(numFrac && userFrac){
    const [,an,ad]= numFrac, [,un,ud]=userFrac;
    if(parseInt(an)*parseInt(ud) === parseInt(un)*parseInt(ad)) return {result:'correct'};
  }

  // Integer answer
  if(!isNaN(Number(norm)) && !isNaN(Number(ans))) {
    if(Math.abs(Number(norm)-Number(ans))<0.001) return {result:'correct'};
  }

  // Numeric spot-check: accepts algebraically equivalent forms
  if(fractionExprsEqual(u, String(problem.answerNorm))) return {result:'correct'};

  return {result:'wrong'};
}

function normalizeExpFracForm(s){
  return s.trim().toLowerCase()
    .replace(/\s+/g,'')
    .replace(/x\^\{([^}]+)\}/g,'x^($1)')
    .replace(/x\^(-?\d+\/\d+)(?!\))/g,'x^($1)')
    .replace(/x\^(-\d+)(?!\))/g,'x^($1)')
    .replace(/\*/g,'');
}

function checkExpFactoringAnswer(problem, u){
  const norm = normalizeExpFracForm(u);
  for(const f of (problem.validForms||[])){
    if(norm === normalizeExpFracForm(f)) return {result:'correct'};
  }
  const strip = s=>s.replace(/\\[a-z]+/g,'').replace(/[{}]/g,'').replace(/\s/g,'').toLowerCase();
  if(strip(norm)===strip(problem.answerTex)) return {result:'correct'};
  return {result:'wrong'};
}

function stripTrigToX(s){
  return s
    .replace(/\\sin\^2\s*x/g,'x^2').replace(/\\cos\^2\s*x/g,'x^2').replace(/\\tan\^2\s*x/g,'x^2')
    .replace(/\(sinx\)\^2/g,'x^2').replace(/\(cosx\)\^2/g,'x^2').replace(/\(tanx\)\^2/g,'x^2')
    .replace(/sin\^2\s*x/g,'x^2').replace(/cos\^2\s*x/g,'x^2').replace(/tan\^2\s*x/g,'x^2')
    .replace(/\\sin\s*x/g,'x').replace(/\\cos\s*x/g,'x').replace(/\\tan\s*x/g,'x')
    .replace(/\bsinx\b/g,'x').replace(/\bcosx\b/g,'x').replace(/\btanx\b/g,'x')
    .replace(/\bsin\s+x\b/g,'x').replace(/\bcos\s+x\b/g,'x').replace(/\btan\s+x\b/g,'x');
}

function checkTrigFactoringAnswer(problem, u){
  if(problem.trigFunc==='mixed'){
    const norms=s=>s.toLowerCase().replace(/\s+/g,'')
      .replace(/\\sin\s*x/g,'sinx').replace(/\\cos\s*x/g,'cosx').replace(/\\tan\s*x/g,'tanx')
      .replace(/\\/g,'').replace(/[{}]/g,'').replace(/\*/g,'');
    const nu=norms(u);
    for(const f of (problem.validForms||[])){
      if(nu===norms(f)) return {result:'correct'};
    }
    return {result:'wrong'};
  }
  const substituted = stripTrigToX(u);
  const synthetic = {
    module:'factoring',
    originalExpanded: problem.originalExpandedPoly,
    isGrouping: false,
    isQuadDisguise: false,
    answerTex: '',
  };
  return checkFactoringAnswer(synthetic, substituted);
}

function getEffectiveDiff(module){
  if(state.difficulty !== 'auto') return parseInt(state.difficulty);
  return state.autoDiff[module] || 1;
}

const ALL_MODULES = ['factoring','exponents','fractions','trig','logs','composition','limits','derivatives','integration','adv_integration'];

// Sequential unlock chain — each tier unlocks when ALL mods in previous tier hit 80%
const UNLOCK_CHAIN = [
  ['factoring','exponents','fractions'],
  ['trig'],
  ['logs'],
  ['composition'],
  ['limits'],
  ['derivatives'],
  ['integration'],
  ['adv_integration'],
];

function getModuleAccuracy(m){
  let total=0, correct=0;
  for(let d=1;d<=5;d++){
    const s=store[m]&&store[m][d];
    if(s&&s.attempts>0){ total+=s.attempts; correct+=s.correct; }
  }
  return total>=5 ? correct/total : null; // null = insufficient data
}

function getUnlockedModules(){
  const unlocked=[];
  for(let tier=0;tier<UNLOCK_CHAIN.length;tier++){
    unlocked.push(...UNLOCK_CHAIN[tier]);
    if(tier===UNLOCK_CHAIN.length-1) break;
    // check if this tier is mastered enough to unlock next
    const tierReady=UNLOCK_CHAIN[tier].every(m=>{
      const acc=getModuleAccuracy(m);
      return acc!==null && acc>=0.8;
    });
    if(!tierReady) break;
  }
  return unlocked;
}

function getNextLockedTier(unlocked){
  for(let tier=0;tier<UNLOCK_CHAIN.length;tier++){
    if(!UNLOCK_CHAIN[tier].every(m=>unlocked.includes(m))) return UNLOCK_CHAIN[tier];
  }
  return null;
}

function pickWeightedModule(){
  const unlocked=getUnlockedModules();
  // Weight: high for new/struggling modules, low for mastered
  const weights=unlocked.map(m=>{
    const acc=getModuleAccuracy(m);
    if(acc===null) return 5;          // new module, no data → high priority
    if(acc<0.8) return 1+(0.8-acc)*6; // struggling → up to ~5.8
    return 0.25;                       // mastered → maintenance only
  });
  const total=weights.reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  for(let i=0;i<unlocked.length;i++){ r-=weights[i]; if(r<=0) return unlocked[i]; }
  return unlocked[unlocked.length-1];
}

let _prevUnlocked=null;

  const unlocked=getUnlockedModules();

  // detect new unlock — show toast
  if(_prevUnlocked && unlocked.length>_prevUnlocked.length){
    const newMods=unlocked.filter(m=>!_prevUnlocked.includes(m));
    newMods.forEach(m=>showUnlockToast(MODULE_LABELS[m]||m));
  }
  _prevUnlocked=[...unlocked];

  // render module pills
  const list=$('unlock-modules-list');
  list.innerHTML='';
  ALL_MODULES.forEach(m=>{
    const isUnlocked=unlocked.includes(m);
    const acc=isUnlocked?getModuleAccuracy(m):null;
    const isNew=isUnlocked&&acc===null;
    const pill=document.createElement('span');
    pill.className='umod '+(isUnlocked?(isNew?'new':'active'):'locked');
    const pct=acc!==null?Math.round(acc*100)+'%':'';
    pill.textContent=(MODULE_LABELS[m]||m)+(pct?' '+pct:'');
    if(!isUnlocked) pill.textContent='🔒 '+(MODULE_LABELS[m]||m);
    list.appendChild(pill);
  });

  // next unlock progress
  const nextTier=getNextLockedTier(unlocked);
  const nextEl=$('unlock-next-text');
  if(nextTier){
    // find which tier gates it — the last tier in unlocked
    const gateTier=UNLOCK_CHAIN[UNLOCK_CHAIN.indexOf(nextTier)-1]||UNLOCK_CHAIN[0];
    const accs=gateTier.map(m=>getModuleAccuracy(m)??0);
    const avgPct=Math.round((accs.reduce((a,b)=>a+b,0)/accs.length)*100);
    nextEl.innerHTML=`Unlock <strong>${(MODULE_LABELS[nextTier[0]]||nextTier[0])}</strong> — reach 80% on current set &nbsp;<progress max="80" value="${Math.min(avgPct,80)}"></progress> ${avgPct}%`;
  } else {
    nextEl.textContent='All modules unlocked!';
  }
}

let _toastTimer=null;
function showUnlockToast(label){
  const t=$('unlock-toast');
  t.textContent='🔓 Unlocked: '+label+'!';
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>t.classList.remove('show'),3500);
}

function pickModule(){
  if(state.module==='all') return pickWeightedModule();
  return state.module;
}

async function generateProblem(){
  const mod = pickModule();
  const diff = getEffectiveDiff(mod==='all'?pickModule():mod);
  const actualMod = mod === 'all' ? pickModule() : mod;
  const resp = await fetch(`${API_BASE}/api/problem?module=${actualMod}&difficulty=${diff}`);
  const problem = await resp.json();
  state.recentProblems.push(problem.problemTex);
  if(state.recentProblems.length > CONFIG.adaptive.dedupWindow) state.recentProblems.shift();
  return problem;
}

function updateAdaptiveDiff(mod, diff, correct){
  const rec = store[mod][diff];
  rec.last10.push(correct?1:0);
  if(rec.last10.length > 10) rec.last10.shift();

  const bump  = CONFIG.adaptive.bumpUpStreak;  // default 5
  const drop  = CONFIG.adaptive.dropDownWrong; // default 3
  const last5 = rec.last10.slice(-5);
  const sumLast5 = last5.reduce((s,v)=>s+v,0);

  if(last5.length===bump && sumLast5===bump && diff < 5){
    state.autoDiff[mod] = Math.min(5, diff+1);
  } else if(last5.length>=drop && (last5.length-sumLast5)>=drop && diff > 1){
    state.autoDiff[mod] = Math.max(1, diff-1);
  }
}

function ensureKatex(cb){

const MODULE_LABELS = {

  limits: 'Limits', derivatives: 'Derivatives', integration: 'Integration',

function renderProblem(problem){
  const typeEl = $('problem-type');
  if(state.module === 'all' && problem.module){
    typeEl.textContent = MODULE_LABELS[problem.module] || problem.module;
  } else {

  }
  ensureKatex(()=>{

function renderSteps(problem, revealCount){
  const list = $('steps-list');
  list.innerHTML='';
  const steps = problem.steps || [];
  for(let i=0;i<steps.length;i++){
    const s=steps[i];
    if(!s) continue;
    const div=document.createElement('div');
    div.className='step-item'+(i<revealCount?' revealed':'');
    if(i<revealCount){
      const label=document.createElement('div');
      label.className='step-label';
      label.textContent=`Step ${i+1}: ${s.label}`;
      div.appendChild(label);
      const math=document.createElement('div');
      math.className='step-math';
      ensureKatex(()=>renderKaTeX(s.math,math));
      div.appendChild(math);
      if(s.note){
        const note=document.createElement('div');
        note.className='step-note';
        note.textContent=s.note;
        div.appendChild(note);
      }
    } else {
      div.innerHTML=`<span style="color:var(--muted);font-size:12px;">Step ${i+1} hidden</span>`;
    }
    list.appendChild(div);
  }
  const btn=$('reveal-step-btn');
  const stepCount=(problem.steps||[]).filter(Boolean).length;
  if(revealCount>=stepCount){
    btn.textContent='All steps shown';
    btn.disabled=true;
  } else {
    btn.textContent=`Reveal step ${revealCount+1} of ${stepCount}`;
    btn.disabled=false;
  }
}

async function loadNewProblem(){
  let problem;
  if(state.mode==='exam'){
    if(state.examIdx >= state.examProblems.length){
      showExamSummary(); return;
    }
    problem = state.examProblems[state.examIdx];
  } else {
    problem = await generateProblem();
  }
  state.currentProblem = problem;
  state.stepsRevealed = 0;
  state.answered = false;

  const input = $('answer-input');
  input.value='';
  input.className='';
  input.disabled=false;
  $('feedback').textContent='';
  $('feedback').className='';

  clearInterval(state.problemTimerInterval);

}

function flashMain(type){

async function submitAnswer(){
  if(state.answered) return;
  const input=$('answer-input');
  const u=input.value.trim();
  if(!u) return;

  $('check-btn').disabled=true;
  const _resp = await fetch(`${API_BASE}/api/check`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({problem: state.currentProblem, input: u, timeSec: state.problemTimer})
  });
  const result = await _resp.json();
  state.answered=true;
  clearInterval(state.problemTimerInterval);

  const mod=state.currentProblem.module;
  const diff=state.currentProblem.difficulty;
  if(!store[mod][diff]) store[mod][diff]={attempts:0,correct:0,streak:0,best_streak:0,last10:[]};
  const rec=store[mod][diff];

  const fb=$('feedback');
  if(result.result==='correct'){
    input.className='correct';
    fb.textContent='✓ Correct!';
    fb.className='correct';
    flashMain('correct');
    state.sessionCorrect++;
    state.sessionStreak++;
    if(state.sessionStreak>state.sessionBestStreak) state.sessionBestStreak=state.sessionStreak;
    rec.attempts++; rec.correct++; rec.streak++;
    if(rec.streak>rec.best_streak) rec.best_streak=rec.streak;
    updateAdaptiveDiff(mod,diff,true);
    awardBadge(mod,diff,rec);
    // Auto-advance after short delay
    setTimeout(()=>{
      $('check-btn').disabled=true;
      loadNewProblem();
    }, 900);
  } else if(result.result==='partial'){
    input.className='wrong';
    fb.textContent=result.msg||'Partially correct — keep going';
    fb.className='info';
    state.answered=false; // let them try again
    input.disabled=false;
    $('check-btn').disabled=false;
  } else {
    input.className='wrong';
    fb.className='wrong';
    // Show canonical answer
    let canonTex='';
    ensureKatex(()=>{
      const span=document.createElement('span');
      try { renderKaTeX(`\\boxed{${state.currentProblem.answerTex}}`,span); } catch(e){ span.textContent='—'; }
      fb.textContent='✗ Incorrect. Answer: ';
      fb.appendChild(span);
    });
    flashMain('wrong');
    state.sessionStreak=0;
    rec.attempts++; rec.streak=0;
    updateAdaptiveDiff(mod,diff,false);
    // Show steps
    renderSteps(state.currentProblem,1);
    state.stepsRevealed=1;
    $('check-btn').disabled=true;
  }

  if(state.mode==='exam') state.examAnswers.push({correct:result.result==='correct'});
  state.sessionTotal++;
  updateStats();
  saveStore();
  updateUnlockBar();
}

function revealNextStep(){
  if(!state.currentProblem) return;
  const steps=(state.currentProblem.steps||[]).filter(Boolean);
  if(state.stepsRevealed<steps.length){
    state.stepsRevealed++;
    renderSteps(state.currentProblem,state.stepsRevealed);
  }
}

function checkReadiness(){
  const mods=ALL_MODULES;
  const ready=mods.every(m=>{
    const d2=store[m][2];

    const acc2=d2.attempts>=5?d2.correct/d2.attempts:0;
    const acc3=d3.attempts>=5?d3.correct/d3.attempts:0;
    return acc2>=0.8||acc3>=0.8;
  });
  const el=$('readiness');
  if(ready){ el.textContent='✓ exam ready'; el.className='ready'; }
  else { el.textContent='exam ready?'; el.className='not-ready'; }
}

function startTimer(seconds){
  clearInterval(state.timerInterval);
  state.timerSeconds=seconds||0;
  const countdown=seconds>0;
  const el=$('timer');
  state.timerInterval=setInterval(()=>{
    if(countdown){
      state.timerSeconds--;
      if(state.timerSeconds<=0){ clearInterval(state.timerInterval); endSprint(); return; }
      const m=Math.floor(state.timerSeconds/60), s=state.timerSeconds%60;
      el.textContent=`${m}:${s.toString().padStart(2,'0')}`;
      el.className=state.timerSeconds<300?'warning':'';
      if(state.timerSeconds<60) el.className='danger';
    } else {
      state.timerSeconds++;
      const m=Math.floor(state.timerSeconds/60), s=state.timerSeconds%60;
      el.textContent=`${m}:${s.toString().padStart(2,'0')}`;
      el.className='';
    }
  },1000);
}

function endSprint(){
  $('timer').textContent='00:00';
  showSessionSummary();
}

async function startSession(){
  state.sessionCorrect=0; state.sessionTotal=0;
  state.sessionStreak=0; state.sessionBestStreak=0;
  updateStats();
  clearInterval(state.timerInterval);
  $('timer').textContent='—';

  if(state.mode==='sprint'){
    startTimer(25*60);
    loadNewProblem();
  } else if(state.mode==='exam'){
    state.examProblems=[];
    state.examIdx=0;
    state.examAnswers=[];
    const mods=ALL_MODULES;
    const examFetches=[];
    for(let i=0;i<20;i++){
      const m=mods[i%mods.length];
      const d=Math.min(Math.ceil((i+1)/7),5);
      examFetches.push(fetch(`${API_BASE}/api/problem?module=${m}&difficulty=${d}`).then(r=>r.json()));
    }
    state.examProblems = await Promise.all(examFetches);
    startTimer(30*60);
    loadNewProblem();
  } else {
    startTimer(0);
    loadNewProblem();
  }
}

  const pct=state.sessionTotal>0?Math.round(state.sessionCorrect/state.sessionTotal*100):0;

function renderTrendChart(data){
  const canvas=$('trend-chart'), empty=$('trend-empty');
  if(!data||data.length===0){
    canvas.style.display='none'; empty.style.display='block';
    empty.textContent='No trend data yet — answer some problems first';
    return;
  }
  canvas.style.display='block'; empty.style.display='none';
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const points=data.map(d=>d.attempts>0?d.correct/d.attempts:null);
  const labels=data.map(d=>d.day.slice(5));
  ctx.fillStyle='#1a1d27'; ctx.fillRect(0,0,W,H);
  ctx.lineWidth=1;
  [0.25,0.5,0.75,1.0].forEach(y=>{
    const py=H-20-(H-30)*y;
    ctx.strokeStyle='#2a2d3a'; ctx.beginPath(); ctx.moveTo(30,py); ctx.lineTo(W-10,py); ctx.stroke();
    ctx.fillStyle='#555'; ctx.font='9px monospace'; ctx.fillText(Math.round(y*100)+'%',2,py+3);
  });
  const n=points.length, stepX=(W-40)/Math.max(n-1,1);
  ctx.strokeStyle='#4d9fff'; ctx.lineWidth=2; ctx.beginPath();
  let started=false;
  points.forEach((p,i)=>{
    if(p===null){started=false;return;}
    const x=30+i*stepX, y=H-20-(H-30)*p;
    if(!started){ctx.moveTo(x,y);started=true;}else ctx.lineTo(x,y);
  });
  ctx.stroke();
  points.forEach((p,i)=>{
    if(p===null)return;
    const x=30+i*stepX, y=H-20-(H-30)*p;
    ctx.fillStyle=p>=0.8?'#4caf50':p>=0.6?'#ffc107':'#f44336';
    ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fill();
  });
  ctx.fillStyle='#666'; ctx.font='9px monospace';
  if(labels.length>0) ctx.fillText(labels[0],30,H-5);
  if(labels.length>1) ctx.fillText(labels[labels.length-1],W-34,H-5);
}

function renderWeakSpots(data){
  const el=$('weak-spots-list');
  if(!data||data.length===0){
    el.innerHTML='<span style="color:var(--muted);font-size:12px;">No weak spots yet — need ≥3 attempts per problem</span>';
    return;
  }
  el.innerHTML=data.map(w=>{
    const acc=Math.round(w.accuracy*100);
    const cls=acc>=80?'high':acc>=60?'mid':'low';
    const mod=w.module.charAt(0).toUpperCase()+w.module.slice(1);
    return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;">
      <span class="acc ${cls}" style="min-width:36px">${acc}%</span>
      <span style="color:var(--muted);min-width:80px">${mod} D${w.difficulty}</span>
      <span style="color:var(--text);font-family:monospace;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${w.problem_tex}">${w.problem_tex}</span>
      <span style="color:var(--muted)">${w.attempts} tries</span>
    </div>`;
  }).join('');
}

  $('session-summary-overlay').classList.remove('visible');
  state.mode='endless';
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode==='endless'));
  startSession();
});
$('dash-btn').addEventListener('click',()=>{
  renderDashboard();
  $('dashboard-overlay').classList.add('visible');
});
$('dash-close-btn').addEventListener('click',()=>$('dashboard-overlay').classList.remove('visible'));

// Module tabs
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    state.module=tab.dataset.module;
    updateUnlockBar();
    loadNewProblem();
  });
});

// Difficulty buttons
document.querySelectorAll('.diff-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.difficulty=btn.dataset.diff==='auto'?'auto':parseInt(btn.dataset.diff);
    loadNewProblem();
  });
});

// Mode buttons
document.querySelectorAll('.mode-btn').forEach(btn=>{
  if(!btn.dataset.mode) return;
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.mode=btn.dataset.mode;
    startSession();
  });
});

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────

ensureKatex(()=>{
  _prevUnlocked=getUnlockedModules();
  updateUnlockBar();
  startSession();
});

// Fallback: if KaTeX takes too long, try anyway
setTimeout(()=>{
  if(!state.currentProblem) startSession();
},3000);
</script>
</body>
</html>
